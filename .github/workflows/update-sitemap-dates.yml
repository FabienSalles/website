name: Update Sitemap Dates

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**'
      - 'src/pages/**'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  update-dates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historique complet pour git log
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap dates
        run: node scripts/generate-sitemap-dates.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/sitemap-dates.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/sitemap-dates.json
          git commit -m "chore: update sitemap dates"
          git push
